{% extends 'base.html' %}
{% block title %}プロフィール編集 | BASE9{% endblock %}
{% block content %}
<div class="container py-5" style="max-width:600px">
  <h1 style="font-size:1.6rem;font-weight:800;margin-bottom:2rem">プロフィール編集</h1>
  <div class="card-base9">
    <div class="card-body p-4 form-base9">
      <form method="post" enctype="multipart/form-data">
        {% csrf_token %}
        {% for field in form %}
          <div class="mb-3">
            <label class="form-label">{{ field.label }}</label>
            {{ field }}
            {% if field.errors %}
              <div class="text-danger" style="font-size:0.82rem">{{ field.errors|join:", " }}</div>
            {% endif %}
          </div>
        {% endfor %}
        <div class="d-flex gap-2 mt-3">
          <button type="submit" class="btn-primary-base9">保存する</button>
          <a href="{% url 'profile' request.user.username %}" class="btn-ghost">キャンセル</a>
        </div>
      </form>
    </div>
  </div>
</div>
{% endblock %}
