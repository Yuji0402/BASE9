{% extends 'base.html' %}
{% block title %}新規登録 | BASE9{% endblock %}
{% block content %}
<div class="container py-5" style="max-width:480px">
  <div class="text-center mb-4">
    <h1 style="font-size:1.8rem;font-weight:800;color:var(--primary)">BASE9に登録</h1>
    <p style="color:var(--text-muted)">無料で草野球仲間を見つけよう</p>
  </div>
  <div class="card-base9">
    <div class="card-body p-4 form-base9">
      <form method="post">
        {% csrf_token %}
        {% for field in form %}
          <div class="mb-3">
            <label class="form-label">{{ field.label }}</label>
            {{ field }}
            {% if field.errors %}
              <div class="text-danger" style="font-size:0.82rem;margin-top:0.25rem">{{ field.errors|join:", " }}</div>
            {% endif %}
          </div>
        {% endfor %}
        <button type="submit" class="btn-primary-base9 w-100 mt-2" style="font-size:1rem;padding:0.75rem">
          アカウントを作成する
        </button>
      </form>
      <div class="divider-text my-4">すでにアカウントをお持ちの方</div>
      <a href="{% url 'login' %}" class="btn-outline-base9 w-100 text-center" style="display:block;text-align:center!important">
        ログインはこちら
      </a>
    </div>
  </div>
</div>
{% endblock %}
